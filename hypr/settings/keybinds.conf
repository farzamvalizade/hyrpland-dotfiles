# -------------------
# ---- PROGRAMS ----
# -------------------
$terminal = kitty
$fileManager = dolphin
$menu = rofi

# -------------------
# ---- KEYBINDINGS ----
# -------------------
$mainMod = SUPER

# Basic binds
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, M, exec, wlogout -b 2 --layout ./.config/wlogout/layout --css ./.config/wlogout/style.css
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, D, exec, ~/.config/rofi/launchers/launcher.sh || pkill rofi
bind = $mainMod, P, pseudo,  # dwindle only
bind = $mainMod, J, layoutmsg, togglesplit   # dwindle only

# Move focus with arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with $mainMod + [0‑9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with $mainMod + SHIFT + [0‑9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces with $mainMod + scroll
bind = $mainMod, mouse:4, workspace, e+1   # scroll down → next workspace
bind = $mainMod, mouse:5, workspace, e-1   # scroll up → previous workspace

# Move/resize windows with $mainMod + LMB / RMB and drag
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume Controls
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
binde = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Microphone Controls
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Brightness Controls
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Media Player Controls
binde = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
binde = , XF86AudioNext, exec, swayosd-client --playerctl next
binde = , XF86AudioPrev, exec, swayosd-client --playerctl prev

# Screenshot (requires grim, slurp, wl‑copy)
bindl = , Print, exec, grim -g "$(slurp -d)" - | wl-copy

# Clipboard manager (rofi + cliphist)
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 -p "Clipboard" -theme ~/.config/rofi/launchers/style-1.rasi | cliphist decode | wl-copy

# Lock screen
bind = $mainMod, L, exec, hyprlock -c ~/.config/hypr/hyprlock/hyprlock.conf

# Theme Switcher
bind = $mainMod, N, exec, ~/.config/hypr/scripts/theme-switcher.sh