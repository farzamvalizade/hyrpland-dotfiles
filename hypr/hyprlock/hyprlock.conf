background {
    path = ~/Pictures/wallpapers/Rain.jpg
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

general {
    no_fade_in = false
}

input-field {
    monitor = 
    size = 200, 45
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(60, 65, 75, 0.4) 
    font_color = rgb(171, 178, 191)    
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Propo
    placeholder_text = Enter Password
    hide_input = false
    position = 0, -425
    valing = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(97, 175, 239, 0.85)    
    font_size = 85
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 310
    haling = center
    valing = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] date +"%A, %B %d"
    color = rgba(86, 182, 194, 0.70) 
    font_size = 30
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 400
    haling = center
    valing = center
}

# Profile Photo
image {
    monitor = 
    path = ~/.config/hypr/hyprlock/PFP.jpg
    border_color = 0xff61afef      
    border_size = 2                    
    size = 110
    rounding = 55                      
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -245
    haling = center
    valing = center
}

# Username
label {
    monitor = 
    text = $USER
    color = rgba(171, 178, 191, 0.85) 
    font_size = 20
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, -340               
    haling = center
    valing = center
}